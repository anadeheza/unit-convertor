<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="convert-box">
        <h2>Unit converter</h2>

        <div class="field">
            <label>Category</label>
            <select id="category" onchange="updateUnits()">
                <option value="l">Length</option>
                <option value="w">Weight</option>
                <option value="ds">Data Size</option>
            </select>
        </div>

        <div class="field">
            <label>Value</label>
            <input type="number" id="val" value="1">
        </div>

        <div class="field">
            <label>From</label>
            <select id="unit1"></select>
        </div>

        <div class="field">
            <label>To</label>
            <select id="unit2"></select>
        </div>

        <button onclick="sendData()">convert</button>

        <div id="result"></div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
